services:
  nginx:
    image: nginx:latest
    ports:
      - "8089:80" # 8080 поменял на 8089 так как 8080 порт занят другим сервисом
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webapp
    networks:
      - app_network

  webapp:
    build:
      context: ./app
    deploy:
      replicas: 3
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

